<ion-content [fullscreen]="true">

  <main class="dashboard">

    <header class="encabezado">

      <div class="marca">

        <div class="logo" aria-hidden="true">
          Rx
        </div>

        <span>PReX</span>

      </div>

      <h1>
        Dashboard del M&eacute;dico
      </h1>

    </header>

    <section class="tarjetas" aria-label="Opciones del medico">

      <article
        class="tarjeta pacientes"
        (click)="irAPacientes()">
        <h2>Pacientes</h2>
      </article>

      <article
        class="tarjeta prescripciones"
        (click)="irAPrescripciones()"
      >
        <h2>Prescripciones</h2>
      </article>

      <article
        class="tarjeta seguimiento"
        (click)="irASeguimiento()">
        <h2>Seguimiento</h2>
      </article>

      <article
        class="tarjeta reportes"
        (click)="irAReportes()">
        <h2>Reportes</h2>
      </article>

      <article
        class="tarjeta perfil"
        (click)="irAPerfil()">
        <h2>Perfil</h2>
      </article>

    </section>

  </main>

</ion-content>
